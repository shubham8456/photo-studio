name: Deploy Photo-Studio (Next.js)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build
          
      - name: Upload & Deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy
        uses: actions/deploy-pages@v4